<nav class="navbar" aria-label="Menu principal">
  <a class="brand" routerLink="/home">Catálogo de Disciplinas</a>

  <div class="links">
    <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>

    @if (authService.estaAutenticado()) {
      <a routerLink="/disciplinas" routerLinkActive="active">Disciplinas</a>
      <a routerLink="/grade-interesse" routerLinkActive="active">Grade de Interesse</a>
      <a routerLink="/usuarios" routerLinkActive="active">Usuários</a>
    }

    <a routerLink="/sobre" routerLinkActive="active">Sobre</a>

    @if (authService.estaAutenticado()) {
      <button class="link-button" type="button" (click)="authService.logout()">Logout</button>
    } @else {
      <a routerLink="/login" routerLinkActive="active">Login</a>
    }
  </div>
</nav>
