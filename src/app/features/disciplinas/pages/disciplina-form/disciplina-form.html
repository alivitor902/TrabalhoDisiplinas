<section class="panel">
  <h1 class="page-title">{{ titulo }}</h1>
  <p class="page-lead">Preencha os dados obrigatórios para salvar a disciplina.</p>

  @if (erro) {
    <p class="alert">{{ erro }}</p>
  }

  @if (carregando) {
    <p class="empty-state">Carregando disciplina...</p>
  }

  <form [formGroup]="form" (ngSubmit)="salvar()" class="form">
    <label>
      Nome
      <input type="text" formControlName="nome" />
      @if (form.controls.nome.hasError('required') && form.controls.nome.touched) {
        <span>Nome obrigatório.</span>
      }
      @if (form.controls.nome.hasError('minlength') && form.controls.nome.touched) {
        <span>Nome deve ter no minimo 3 caracteres.</span>
      }
    </label>

    <label>
      Descrição
      <textarea rows="4" formControlName="descricao"></textarea>
      @if (form.controls.descricao.invalid && form.controls.descricao.touched) {
        <span>Descrição obrigatória.</span>
      }
    </label>

    <label>
      Carga horária
      <input type="number" min="1" formControlName="cargaHoraria" />
      @if (form.controls.cargaHoraria.hasError('required') && form.controls.cargaHoraria.touched) {
        <span>Carga horária obrigatória.</span>
      }
      @if (form.controls.cargaHoraria.hasError('min') && form.controls.cargaHoraria.touched) {
        <span>Carga horária deve ser maior que zero.</span>
      }
    </label>

    <label>
      Professor
      <input type="text" formControlName="professor" />
      @if (form.controls.professor.invalid && form.controls.professor.touched) {
        <span>Professor obrigatório.</span>
      }
    </label>

    <label>
      Período
      <input type="text" formControlName="periodo" placeholder="Ex.: 3º período" />
      @if (form.controls.periodo.invalid && form.controls.periodo.touched) {
        <span>Período obrigatório.</span>
      }
    </label>

    <label>
      Categoria
      <input type="text" formControlName="categoria" />
      @if (form.controls.categoria.invalid && form.controls.categoria.touched) {
        <span>Categoria obrigatória.</span>
      }
    </label>

    <div class="actions">
      <button class="button" type="submit" [disabled]="salvando || carregando">
        {{ salvando ? 'Salvando...' : 'Salvar' }}
      </button>
      <a class="button secondary" routerLink="/disciplinas">Cancelar</a>
    </div>
  </form>
</section>
